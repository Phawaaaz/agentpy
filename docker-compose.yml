# Production-shaped stack: the API server + Postgres.
# Copy .env.example to .env and fill in secrets before `docker compose up`.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: harness
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Model + key (required) -- inject as real secrets in production.
      HARNESS_MODEL: ${HARNESS_MODEL:-anthropic/claude-opus-4-8}
      HARNESS_API_KEY: ${HARNESS_API_KEY:?set HARNESS_API_KEY}
      HARNESS_JWT_SECRET: ${HARNESS_JWT_SECRET:?set a stable 32+ byte secret}
      # Multi-user storage in Postgres (not the SQLite default).
      HARNESS_DB_URL: postgresql+psycopg://harness:${POSTGRES_PASSWORD:-changeme}@db:5432/harness
      # Safe server defaults: confine workspaces; deny "ask" (no human attached).
      HARNESS_CONFINE_WORKSPACE: "true"
      HARNESS_PERMISSION_MODE: allowlist
    ports:
      - "8000:8000"
    volumes:
      - harness_data:/app/.harness
      - harness_ws:/app/workspaces

volumes:
  pgdata:
  harness_data:
  harness_ws:
