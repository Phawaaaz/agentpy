# Serves the built single-page app and reverse-proxies the API to the backend.
# One origin: the browser talks only to this server; nginx forwards API paths.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static SPA: unknown paths fall back to index.html (client-side app).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API endpoints -> backend container. These prefixes are the app's routes.
    location ~ ^/(auth|sessions|models|admin|skills|health) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: the streamed turn must flush token-by-token, so
        # disable buffering and allow a long-lived connection.
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        chunked_transfer_encoding off;
    }
}
